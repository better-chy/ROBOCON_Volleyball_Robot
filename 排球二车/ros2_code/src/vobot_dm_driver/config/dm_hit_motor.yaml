dm_hit_motor_node:
  ros__parameters:
    trigger_topic: "/hit_trigger"
    can_interface: "can0"

    # Shared-ID mode: the three hit motors all listen on CAN ID 8.
    shared_can_id_mode: true
    shared_motor_id: 8

    # Keep the independent-ID parameters for fallback, but they are unused
    # while shared_can_id_mode is true.
    motor_ids: [7, 8, 9]
    command_id_offset: 0x200
    position_command_id_offset: 0x100

    # Position clamp for the shared-ID hit group.
    min_position_rad: 0.0
    max_position_rad: 5.0

    # Legacy single-value parameters kept for compatibility.
    # The active strike/ready values below are the first element of
    # ready_positions_rad / strike_positions_rad even in shared-ID mode.
    ready_position_rad: 0.0
    strike_position_rad: 1.5

    # Active position targets. In shared-ID mode, the first element is used.
    ready_positions_rad: [0.0, 0.0, 0.0]
    strike_positions_rad: [1.6, 1.6, 1.6]
    strike_velocity_rad_s: 5.0
    return_velocity_rad_s: 2.0

    strike_hold_ms: 80
    strike_hold_margin_ms: 80
    cooldown_ms: 400

    clear_errors_on_startup: true
    auto_enable_on_trigger: true
    disable_on_shutdown: true
